const keys = {};
let touchLeft = null, touchRight = null;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  // Only prevent default for game keys, not all keys
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyW','KeyA','KeyS','KeyD'].includes(e.code)) {
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// CRITICAL FIX: Only capture touches for game controls when actually playing
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState !== 'playing' && gameState !== 'paused') return; // Don't capture for menus
  if (countdown > 0) return;
  for (let t of e.changedTouches) {
    const x = t.clientX, y = t.clientY;
    if (x < W / 2) {
      touchLeft = { id: t.identifier, sx: x, sy: y, cx: x, cy: y };
    } else {
      touchRight = { id: t.identifier, sx: x, sy: y, cx: x, cy: y };
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (let t of e.changedTouches) {
    if (touchLeft && t.identifier === touchLeft.id) {
      touchLeft.cx = t.clientX; touchLeft.cy = t.clientY;
    }
    if (touchRight && t.identifier === touchRight.id) {
      touchRight.cx = t.clientX; touchRight.cy = t.clientY;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (let t of e.changedTouches) {
    if (touchLeft && t.identifier === touchLeft.id) touchLeft = null;
    if (touchRight && t.identifier === touchRight.id) touchRight = null;
  }
  // Handle as menu tap for non-playing states
  if (gameState !== 'playing') {
    const t = e.changedTouches ? e.changedTouches[0] : null;
    if (t) handleClickAt(t.clientX, t.clientY);
  }
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  touchLeft = null;
  touchRight = null;
}, { passive: false });

function getSteer() {
  if (touchLeft) {
    const dx = touchLeft.cx - touchLeft.sx;
    return Math.max(-1, Math.min(1, dx / 60));
  }
  if (keys['ArrowLeft'] || keys['KeyA']) return -1;
  if (keys['ArrowRight'] || keys['KeyD']) return 1;
  return 0;
}
function getGas() {
  if (touchRight) {
    const dy = touchRight.sy - touchRight.cy;
    return dy > 20 ? 1 : 0;
  }
  return (keys['ArrowUp'] || keys['KeyW']) ? 1 : 0;
}
function getBrake() {
  if (touchRight) {
    const dy = touchRight.cy - touchRight.sy;
    return dy > 20 ? 1 : 0;
  }
  return (keys['ArrowDown'] || keys['KeyS'] || keys['Space']) ? 1 : 0;
}

// --- AUDIO ENGINE ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let masterGain = null;
let engineOsc = null, engineGain = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new AudioCtx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
    engineOsc = audioCtx.createOscillator();
    engineGain = audioCtx.createGain();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 80;
    engineGain.gain.value = 0;
    engineOsc.connect(engineGain);
    const engineFilter = audioCtx.createBiquadFilter();
    engineFilter.type = 'lowpass';
    engineFilter.frequency.value = 400;
    engineGain.connect(engineFilter);
    engineFilter.connect(masterGain);
    engineOsc.start();
  } catch(e) { console.log('Audio init failed', e); }
}

function playTone(freq, dur, vol = 0.1, type = 'sine') {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g);
    g.connect(masterGain);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function playDriftSound() { playTone(100 + Math.random() * 50, 0.1, 0.05, 'sawtooth'); }
function playCheckpoint() { playTone(880, 0.15, 0.15); setTimeout(() => playTone(1100, 0.15, 0.12), 100); }
function playLapComplete() { playTone(660, 0.1, 0.2); setTimeout(() => playTone(880, 0.1, 0.18), 100); setTimeout(() => playTone(1100, 0.2, 0.15), 200); }
function playMenuSelect() { playTone(600, 0.08, 0.1); }
function playUnlock() { playTone(440, 0.15, 0.15); setTimeout(() => playTone(660, 0.15, 0.12), 150); setTimeout(() => playTone(880, 0.15, 0.1), 300); setTimeout(() => playTone(1100, 0.3, 0.15), 450); }

function updateEngineSound(rpm, throttle) {
  if (!engineOsc || !engineGain) return;
  try {
    engineOsc.frequency.value = 60 + rpm * 200;
    engineGain.gain.value = Math.min(0.08, throttle * 0.06 + 0.02);
  } catch(e) {}
}

function stopEngineSound() {
  if (!engineGain || !audioCtx) return;
  try { engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.15); } catch(e) {}
}

function playResultsTune(score) {

// Sanitise a string for use as a Firebase key (no Unicode, no special chars)
function toFirebaseKey(str) {
  return (str || '')
    .normalize('NFD').replace(/[̀-ͯ]/g, '') // strip diacritics (Ū→U, Ō→O)
    .replace(/[^a-zA-Z0-9_-]/g, '_')                  // replace remaining specials
    .slice(0, 32) || 'unknown';
}

function refreshLeaderboard() {
  if (!fbDb) return;
  leaderboardLoaded = false;
  leaderboardByTrack = {};

  const promises = tracks.map(track => {
    const trackKey = toFirebaseKey(track.name);
    // Fetch all entries, sort and slice client-side to avoid Firebase
    // tied-score bugs with orderByChild().limitToLast()
    return fbDb.ref('leaderboard/' + trackKey)
      .once('value')
      .then(snap => {
        // Use snap.val() + Object.values() — avoids snap.forEach ordering issues
        const raw = snap.val();
        console.log('[LB DEBUG] ' + trackKey + ' raw:', JSON.stringify(raw));
        const entries = raw ? Object.values(raw) : [];
        entries.sort((a, b) => b.score - a.score);
        leaderboardByTrack[track.name] = entries.slice(0, 5);
        console.log('[LB] ' + trackKey + ': ' + entries.length + ' entries — ' +
          entries.slice(0,5).map(e => e.name + '=' + e.score).join(', '));
      })
      .catch(err => {
        console.warn('[LB] Error reading ' + trackKey + ':', err);
        leaderboardByTrack[track.name] = [];
      });
  });

  Promise.all(promises).then(() => {
    leaderboardLoaded = true;
  });
}

function ensurePlayerName() {
  if (!playerName) {
    const n = (prompt('Enter your name for the leaderboard:') || '').trim();
    playerName = n.slice(0, 18) || 'Anonymous';
    localStorage.setItem('driftpure_name', playerName);
  }
  return playerName;
}

function submitScore(score, trackName, time) {
  if (!fbDb || score <= 0) return;
  const name   = ensurePlayerName();
  const tKey   = toFirebaseKey(trackName);          // e.g. SHUKAI, TOGE
  const pKey   = toFirebaseKey(name);               // e.g. Zachary
  const ref    = fbDb.ref('leaderboard/' + tKey + '/' + pKey);
  // set() writes one entry per player per track.
  // The Firebase rule only allows this if no entry exists yet,
  // OR the new score is strictly higher than the existing one.
  ref.set({
    name,
    score,
    time: Math.round(time * 100) / 100,
    ts: Date.now()
  }).then(() => {
    console.log('Score saved:', name, score, trackName);
  }).catch(err => {
    // Most likely reason: score didn't beat existing — that's expected.
    console.log('Score not saved (not a new best or rule blocked):', err.message);
  });
}

// --- Catmull-Rom spline interpolation ---
function catmullRom(p0, p1, p2, p3, t) {
  const t2 = t * t, t3 = t2 * t;
  return {
    x: 0.5 * ((2*p1.x) + (-p0.x+p2.x)*t + (2*p0.x-5*p1.x+4*p2.x-p3.x)*t2 + (-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y: 0.5 * ((2*p1.y) + (-p0.y+p2.y)*t + (2*p0.y-5*p1.y+4*p2.y-p3.y)*t2 + (-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
  };
}

function smoothPath(controlPts, stepsPerSeg = 12) {
  const pts = [];
  const n = controlPts.length;
  for (let i = 0; i < n; i++) {
    const p0 = controlPts[(i - 1 + n) % n];
    const p1 = controlPts[i];
    const p2 = controlPts[(i + 1) % n];
    const p3 = controlPts[(i + 2) % n];
    for (let s = 0; s < stepsPerSeg; s++) {
      pts.push(catmullRom(p0, p1, p2, p3, s / stepsPerSeg));
    }
  }
  return pts;
}

function buildTrackFromPath(controlPts, trackWidth, stepsPerSeg = 12) {
  const path = smoothPath(controlPts, stepsPerSeg);
  const n = path.length;
  const hw = trackWidth / 2;
  const walls = [];

  // Compute averaged normals to prevent self-intersection
  const normals = [];
  for (let i = 0; i < n; i++) {
    const prev = path[(i - 1 + n) % n];
    const next = path[(i + 1) % n];
    const dx = next.x - prev.x, dy = next.y - prev.y;
    const l = Math.sqrt(dx * dx + dy * dy) || 1;
    normals.push({ x: -dy / l, y: dx / l });
  }

  // Build wall segments
  const inner = [], outer = [];
  for (let i = 0; i < n; i++) {
    inner.push({ x: path[i].x - normals[i].x * hw, y: path[i].y - normals[i].y * hw });
    outer.push({ x: path[i].x + normals[i].x * hw, y: path[i].y + normals[i].y * hw });
  }
  for (let i = 0; i < n; i++) {
    const ni = (i + 1) % n;
    walls.push({ x1: inner[i].x, y1: inner[i].y, x2: inner[ni].x, y2: inner[ni].y });
    walls.push({ x1: outer[i].x, y1: outer[i].y, x2: outer[ni].x, y2: outer[ni].y });
  }

  // Checkpoints evenly around the track
  const numCP = 6;
  const checkpoints = [];
  for (let c = 0; c < numCP; c++) {
    const idx = Math.floor((c / numCP) * n);
    const p = path[idx];
    const nm = normals[idx];
    // checkpoint normal = tangent direction
    const prev = path[(idx - 1 + n) % n];
    const next = path[(idx + 1) % n];
    const tx = next.x - prev.x, ty = next.y - prev.y;
    const tl = Math.sqrt(tx * tx + ty * ty) || 1;
    checkpoints.push({ x: p.x, y: p.y, nx: tx / tl, ny: ty / tl, w: trackWidth });
  }

  // Start position and angle from first point
  const startTx = path[1].x - path[0].x, startTy = path[1].y - path[0].y;
  const startAngle = Math.atan2(startTy, startTx);

  return { walls, checkpoints, start: { x: path[0].x, y: path[0].y }, startAngle };
}

// --- CAR PHYSICS ---
class Car {
  constructor(carDef) {
    this.x = 0; this.y = 0; this.angle = 0;
    this.vx = 0; this.vy = 0;
    this.angVel = 0; this.speed = 0; this.steerAngle = 0;
    this.drifting = false; this.driftAngle = 0; this.hitWall = false;
    this.def = carDef;
    this.wheelBase = 28; this.width = 16; this.length = 32;
    this.tireMarks = []; this.particles = [];
  }

  reset(x, y, angle) {
    this.x = x; this.y = y; this.angle = angle;
    this.vx = 0; this.vy = 0;
    this.angVel = 0; this.speed = 0;
    this.steerAngle = 0; this.drifting = false; this.hitWall = false;
    this.tireMarks = []; this.particles = [];
  }

  update(dt, steer, gas, brake, walls) {
    const def = this.def;

    // Steering: snappy response, wider angle for tight turns
    const maxSteer = 50 * DEG;
    const steerSpeed = 15; // how fast steering responds (higher = snappier)
    this.steerAngle += (steer * maxSteer - this.steerAngle) * steerSpeed * dt;

    // Forward/side directions
    const fx = Math.cos(this.angle), fy = Math.sin(this.angle);
    this.speed = this.vx * fx + this.vy * fy;
    const latSpeed = -this.vx * fy + this.vy * fx;
    const absSpeed = Math.abs(this.speed);

    // Acceleration
    const accel = def.power * 0.1 / def.weight;
    const brakeAccel = 600 / def.weight;

    if (gas > 0) {
      this.vx += fx * accel * gas * dt;
      this.vy += fy * accel * gas * dt;
    }

    if (brake > 0) {
      if (this.speed > 10) {
        this.vx -= fx * brakeAccel * brake * dt;
        this.vy -= fy * brakeAccel * brake * dt;
      } else if (this.speed < -10) {
        this.vx += fx * brakeAccel * 0.5 * brake * dt;
        this.vy += fy * brakeAccel * 0.5 * brake * dt;
      } else {
        this.vx -= fx * accel * 0.4 * brake * dt;
        this.vy -= fy * accel * 0.4 * brake * dt;
      }
    }

    // Drift detection — low threshold so drifts start easily
    this.driftAngle = Math.abs(Math.atan2(latSpeed, absSpeed + 0.1));
    this.drifting = this.driftAngle > 6 * DEG && absSpeed > 30;

    // Lateral grip — base grip keeps car on line, reduced heavily when drifting
    let latFric = def.grip * 6;

    if (this.drifting) {
      // Sustain the drift: very low lateral grip so the slide keeps going
      latFric *= 0.10;

      // Throttle while drifting = rear wheels keep spinning = drift sustains
      if (gas > 0) latFric *= 0.55;

      // Steer INTO the drift = countersteering keeps it alive even longer
      const countersteering = Math.sign(latSpeed) === Math.sign(steer);
      if (countersteering && Math.abs(steer) > 0.2) {
        latFric *= 0.65; // even less grip when countersteering = longer drifts
      }

      // Visual effects
      if (frameCount % 2 === 0) {
        const rearX = this.x - fx * this.wheelBase * 0.5;
        const rearY = this.y - fy * this.wheelBase * 0.5;
        this.tireMarks.push({ x: rearX - fy * this.width * 0.4, y: rearY + fx * this.width * 0.4 });
        this.tireMarks.push({ x: rearX + fy * this.width * 0.4, y: rearY - fx * this.width * 0.4 });
        if (Math.random() > 0.3) {
          this.particles.push({
            x: rearX + (Math.random()-0.5)*12, y: rearY + (Math.random()-0.5)*12,
            vx: -fx*30 + (Math.random()-0.5)*50, vy: -fy*30 + (Math.random()-0.5)*50,
            life: 0.6, maxLife: 0.6
          });
        }
      }
    }

    // Handbrake: brake while turning = instantly kick rear out to START a drift
    if (brake > 0 && Math.abs(steer) > 0.2 && absSpeed > 15) {
      latFric *= 0.12;
      // Add strong rotational kick to initiate the slide
      this.angVel += steer * 6.0 * dt;
    }

    // Throttle while turning also loosens the rear (power oversteer)
    if (gas > 0 && Math.abs(steer) > 0.15 && absSpeed > 30) {
      latFric *= 0.5;
    }

    // Apply lateral friction
    this.vx -= (-fy) * latSpeed * latFric * dt;
    this.vy -= (fx) * latSpeed * latFric * dt;

    // Steering → angular velocity
    if (absSpeed > 5) {
      const speedFactor = Math.min(absSpeed, 150) / 100;
      const direction = this.speed >= 0 ? 1 : -1;
      const turnRate = this.steerAngle * speedFactor * direction * 3.0;
      this.angVel += (turnRate - this.angVel) * 10 * dt;
    } else {
      this.angVel *= 0.85;
    }

    // Rolling drag
    const drag = 1.3;
    this.vx *= (1 - drag * dt);
    this.vy *= (1 - drag * dt);

    this.angle += this.angVel * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;

    this.collideWalls(walls);
    if (this.tireMarks.length > 2000) this.tireMarks = this.tireMarks.slice(-1500);
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
      if (p.life <= 0) this.particles.splice(i, 1);
    }

    updateEngineSound(Math.min(1, Math.abs(this.speed) / 300), gas);
  }

  collideWalls(walls) {
    this.hitWall = false;
    const corners = this.getCorners();
    for (const wall of walls) {
      for (const c of corners) {
        const dist = ptSegDist(c.x, c.y, wall.x1, wall.y1, wall.x2, wall.y2);
        if (dist < 3) {
          const wx = wall.x2 - wall.x1, wy = wall.y2 - wall.y1;
          const wl = Math.sqrt(wx*wx + wy*wy) || 1;
          let nx = -wy / wl, ny = wx / wl;
          const toCar = { x: this.x - wall.x1, y: this.y - wall.y1 };
          if (toCar.x * nx + toCar.y * ny < 0) { nx = -nx; ny = -ny; }
          this.hitWall = true;
          this.x += nx * 5; this.y += ny * 5;
          const velDotN = this.vx * nx + this.vy * ny;
          if (velDotN < 0) {
            this.vx -= 1.5 * velDotN * nx;
            this.vy -= 1.5 * velDotN * ny;
            this.speed *= 0.7;
          }
        }
      }
    }
  }

  getCorners() {
    const fx = Math.cos(this.angle), fy = Math.sin(this.angle);
    const sx = -fy, sy = fx;
    const hw = this.width/2, hl = this.length/2;
    return [
      { x: this.x+fx*hl+sx*hw, y: this.y+fy*hl+sy*hw },
      { x: this.x+fx*hl-sx*hw, y: this.y+fy*hl-sy*hw },
      { x: this.x-fx*hl+sx*hw, y: this.y-fy*hl+sy*hw },
      { x: this.x-fx*hl-sx*hw, y: this.y-fy*hl-sy*hw }
    ];
  }
}

function ptSegDist(px, py, x1, y1, x2, y2) {
  const dx = x2-x1, dy = y2-y1;
  const len2 = dx*dx + dy*dy;
  if (len2 === 0) return Math.sqrt((px-x1)*(px-x1) + (py-y1)*(py-y1));
  let t = Math.max(0, Math.min(1, ((px-x1)*dx + (py-y1)*dy) / len2));
  const cx = x1 + t*dx, cy = y1 + t*dy;
  return Math.sqrt((px-cx)*(px-cx) + (py-cy)*(py-cy));
}

// --- RACE STATE ---
let car = null, currentTrack = null;
let raceTime = 0, lapCount = 0, currentCheckpoint = 0;
let driftScore = 0, driftCombo = 0, driftComboTimer = 0, driftMultiplier = 1, totalDriftScore = 0;
let sparks = [], damageHits = 0, hitWallCooldown = 0;
let lapTimes = [], countdown = 0, raceFinished = false, bestLapTime = Infinity;
let camera = { x: 0, y: 0, zoom: 1, targetZoom: 1 };
let menuHover = 0, selectHover = 0;
let seriesUnlockPending = false;
let leaderboardSeriesTab = 1;

function startRace(trackIdx, carIdx) {
  initAudio();
  currentTrack = tracks[trackIdx];
  car = new Car(cars[carIdx]);
  car.reset(currentTrack.startPos.x, currentTrack.startPos.y, currentTrack.startAngle || 0);
  camera.x = car.x; camera.y = car.y; camera.zoom = 1; camera.targetZoom = 1;
  raceTime = 0; lapCount = 0; currentCheckpoint = 1;
  driftScore = 0; driftCombo = 0; driftComboTimer = 0; driftMultiplier = 1; totalDriftScore = 0;
  sparks = []; damageHits = 0; hitWallCooldown = 0;
  lapTimes = []; countdown = 3.5; raceFinished = false; bestLapTime = Infinity;
  touchLeft = null; touchRight = null;
  logGameEvent('race_start', { track: currentTrack.name, car: cars[carIdx].name });
  gameState = 'playing';
}

function updateRace(dt) {
  if (countdown > 0) {
    countdown -= dt;
    camera.x += (car.x - camera.x) * 4 * dt;
    camera.y += (car.y - camera.y) * 4 * dt;
    return;
  }

  car.update(dt, getSteer(), getGas(), getBrake(), currentTrack.walls);
  raceTime += dt;

  // Wall hit kills the drift combo / multiplier
  if (car.hitWall && (driftCombo > 0 || driftMultiplier > 1)) {
    driftCombo = 0; driftMultiplier = 1; driftComboTimer = 0;
  }

  // Wall hit visual damage: sparks on impact + progressive smoke
  if (car.hitWall && hitWallCooldown <= 0) {
    damageHits = Math.min(5, damageHits + 1);
    hitWallCooldown = 0.35;
    // Burst of sparks at impact point
    for (let i = 0; i < 16; i++) {
      const a = Math.random() * TAU;
      const spd = 90 + Math.random() * 160;
      sparks.push({
        x: car.x, y: car.y,
        vx: Math.cos(a) * spd + car.vx * 0.25,
        vy: Math.sin(a) * spd + car.vy * 0.25,
        life: 0.2 + Math.random() * 0.3,
        maxLife: 0.5,
        r: Math.floor(210 + Math.random() * 45),
        g: Math.floor(70 + Math.random() * 120),
        b: Math.floor(Math.random() * 20)
      });
    }
  }
  if (hitWallCooldown > 0) hitWallCooldown -= dt;

  // Damage smoke — grows denser with more hits
  if (damageHits > 0 && frameCount % Math.max(1, 6 - damageHits) === 0) {
    const fx = Math.cos(car.angle), fy = Math.sin(car.angle);
    car.particles.push({
      x: car.x + fx * car.length * 0.38 + (Math.random()-0.5)*6,
      y: car.y + fy * car.length * 0.38 + (Math.random()-0.5)*6,
      vx: fx * 18 + (Math.random()-0.5)*22,
      vy: fy * 18 + (Math.random()-0.5)*22,
      life: 1.1 + Math.random() * 0.6,
      maxLife: 1.7,
      isDamage: true
    });
  }

  // Update sparks
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx * dt; s.y += s.vy * dt;
    s.vx *= 0.78; s.vy *= 0.78;
    s.life -= dt;
    if (s.life <= 0) sparks.splice(i, 1);
  }

  const lookAhead = 60;
  camera.x += (car.x + Math.cos(car.angle) * lookAhead - camera.x) * 3 * dt;
  camera.y += (car.y + Math.sin(car.angle) * lookAhead - camera.y) * 3 * dt;
  camera.targetZoom = 1 - Math.min(1, Math.abs(car.speed) / 300) * 0.2;
  camera.zoom += (camera.targetZoom - camera.zoom) * 2 * dt;

  // Drift scoring
  if (car.drifting) {
    driftCombo += car.driftAngle * Math.abs(car.speed) * 0.5 * car.def.driftBonus * dt;
    driftComboTimer = 1.2;
    driftMultiplier = Math.min(5, 1 + Math.floor(driftCombo / 800));
    if (frameCount % 10 === 0) playDriftSound();
  }
  if (driftComboTimer > 0) {
    driftComboTimer -= dt;
    if (driftComboTimer <= 0 && driftCombo > 0) {
      totalDriftScore += Math.floor(driftCombo * driftMultiplier);
      driftScore += Math.floor(driftCombo * driftMultiplier);
      driftCombo = 0; driftMultiplier = 1;
    }
  }

  // Checkpoints — CP0 is the start/finish line, CPs 1-N are invisible trackers.
  // Lap fires when the car crosses CP0 after completing the full circuit (1→…→N→0).
  if (currentTrack.checkpoints.length > 0) {
    const cp = currentTrack.checkpoints[currentCheckpoint];
    const dx = car.x - cp.x, dy = car.y - cp.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const dot = dx * cp.nx + dy * cp.ny;
    if (dist < cp.w && Math.abs(dot) < 30) {
      const next = (currentCheckpoint + 1) % currentTrack.checkpoints.length;
      currentCheckpoint = next;
      if (next === 1) {
        // Just crossed CP0 (start/finish) — lap complete
        lapCount++;
        const lapTime = raceTime - lapTimes.reduce((a,b) => a+b, 0);
        lapTimes.push(lapTime);
        if (lapTime < bestLapTime) bestLapTime = lapTime;
        if (lapCount >= currentTrack.laps) finishRace();
        else playLapComplete();
      } else {
        playCheckpoint();
      }
    }
  }
}

function finishRace() {
  // Flush any in-progress drift combo so it counts toward the final score
  if (driftCombo > 0) {
    totalDriftScore += Math.floor(driftCombo * driftMultiplier);
    driftScore += Math.floor(driftCombo * driftMultiplier);
    driftCombo = 0; driftMultiplier = 1;
  }
  raceFinished = true; gameState = 'results'; menuHover = 0;
  const ti = saveData.selectedTrack;
  const isNewBest = totalDriftScore > saveData.bestScores[ti];
  if (isNewBest) saveData.bestScores[ti] = totalDriftScore;
  if (raceTime < saveData.bestTimes[ti] || saveData.bestTimes[ti] === 0) saveData.bestTimes[ti] = raceTime;
  saveData.totalDriftScore += totalDriftScore;
  logGameEvent('race_complete', {
    track: currentTrack.name,
    car: car.def.name,
    score: totalDriftScore,
    race_time_s: Math.round(raceTime),
    best_lap_s: bestLapTime < Infinity ? Math.round(bestLapTime) : null,
    laps: lapCount,
    new_best: isNewBest
  });
  for (let i = 0; i < cars.length; i++) {
    if (!saveData.unlockedCars[i] && cars[i].unlock && saveData.totalDriftScore >= cars[i].unlock) {
      saveData.unlockedCars[i] = true; playUnlock();
    }
  }
  // Series II unlock: all 5 Series I tracks must be completed at least once
  if (!saveData.series2Unlocked) {
    const allSeries1Done = [0,1,2,3,4].every(i => saveData.bestTimes[i] > 0);
    if (allSeries1Done) {
      saveData.series2Unlocked = true;
      for (let i = 5; i < tracks.length; i++) saveData.unlockedTracks[i] = true;
      seriesUnlockPending = true;
      playUnlock();
    }
  }
  submitScore(totalDriftScore, currentTrack.name, raceTime);
  saveSave();
  stopEngineSound();
  setTimeout(() => playResultsTune(totalDriftScore), 350);
}

// --- RENDERING ---
function render() {
  ctx.save();
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  switch (gameState) {
    case 'menu': renderMenu(); break;
    case 'trackSelect': renderTrackSelect(); break;
    case 'carSelect': renderCarSelect(); break;
    case 'leaderboard': renderLeaderboard(); break;
    case 'playing': renderGame(); break;
    case 'paused': renderGame(); renderPause(); break;
    case 'results': renderGame(); renderResults(); break;
  }
  ctx.restore();
}

// --- MENU BUTTONS (reliable click targets) ---
function getMenuButtons() {
  const btnW = Math.min(200, W * 0.5);
  const btnH = 50;
  const startY = H * 0.48;
  return ['RACE', 'LEADERBOARD', 'CARS', 'HOW TO PLAY'].map((label, i) => ({
    label, x: W/2 - btnW/2, y: startY + i * 58, w: btnW, h: btnH
  }));
}

function getTrackButtons() {
  const cols = Math.min(5, Math.max(1, Math.floor(W / 160)));
  const cardW = Math.min(160, (W - 40) / cols - 10);
  const cardH = cardW * 0.7;
  const headerH = 24;
  const gap = 10;
  const s1Rows = Math.ceil(5 / cols);
  const s1StartY = H * 0.16;
  const s2StartY = s1StartY + s1Rows * (cardH + gap) + headerH + 14;
  const totalW = cols * cardW + (cols - 1) * gap;
  const startX = (W - totalW) / 2;
  return tracks.map((t, i) => {
    const isSeries2 = i >= 5;
    const si = isSeries2 ? i - 5 : i;
    const col = si % cols;
    const row = Math.floor(si / cols);
    const baseY = isSeries2 ? s2StartY : s1StartY;
    return {
      label: t.name, x: startX + col * (cardW + gap), y: baseY + row * (cardH + gap),
      w: cardW, h: cardH, idx: i, unlocked: saveData.unlockedTracks[i], series: isSeries2 ? 2 : 1
    };
  });
}

function getCarButtons() {
  const cardW = Math.min(150, (W - 60) / 4 - 10);
  const cardH = cardW * 1.3;
  const totalW = 4 * cardW + 3 * 12;
  const startX = (W - totalW) / 2;
  return cars.map((c, i) => ({
    label: c.name, x: startX + i * (cardW + 12), y: H * 0.3,
    w: cardW, h: cardH, idx: i, unlocked: saveData.unlockedCars[i]
  }));
}

function updateMenuBg(dt) {
  const mb = menuBg;
  if (mb.x === -1) {
    mb.x = W / 2; mb.y = H / 2;
    // Seed ambient embers spread across the screen
    for (let i = 0; i < 40; i++) {
      mb.embers.push({
        x: Math.random() * W, y: Math.random() * H,
        vx: (Math.random() - 0.5) * 16,
        vy: -8 - Math.random() * 20,
        life: Math.random(),
        decay: 0.055 + Math.random() * 0.07,
        r: 1.0 + Math.random() * 2.0
      });
    }
  }
  mb.t += dt * 0.48;
  const t = mb.t;
  const rx = W * 0.37, ry = H * 0.27;
  const denom = 1 + Math.sin(t) * Math.sin(t);
  const nx = W / 2 + rx * Math.cos(t) / denom;
  const ny = H / 2 + ry * Math.sin(t) * Math.cos(t) / denom;
  const dx = nx - mb.x, dy = ny - mb.y;
  mb.speed = Math.sqrt(dx * dx + dy * dy) / dt;
  if (dx * dx + dy * dy > 0.001) mb.angle = Math.atan2(dy, dx);
  let adiff = mb.angle - mb.prevAngle;
  while (adiff > PI) adiff -= TAU; while (adiff < -PI) adiff += TAU;
  mb.drifting = Math.abs(adiff) > 0.045 && mb.speed > 40;
  mb.prevAngle = mb.angle;
  mb.x = nx; mb.y = ny;
  mb.frameSkip++;
  if (mb.frameSkip >= 2) {
    mb.frameSkip = 0;
    mb.trail.push({ x: nx, y: ny, drift: mb.drifting, age: 0 });
    if (mb.trail.length > 900) mb.trail.shift();
  }
  for (const p of mb.trail) p.age += dt;
  // More sparks, slightly slower decay for bigger trails
  if (mb.drifting && Math.random() < dt * 55) {
    const side = Math.random() < 0.5 ? -1 : 1;
    const spk = 75 + Math.random() * 130;
    mb.particles.push({
      x: nx + Math.cos(mb.angle + PI / 2 * side) * 14,
      y: ny + Math.sin(mb.angle + PI / 2 * side) * 14,
      vx: Math.cos(mb.angle + PI + (Math.random() - 0.5) * 1.8) * spk,
      vy: Math.sin(mb.angle + PI + (Math.random() - 0.5) * 1.8) * spk,
      life: 1.0, decay: 1.3 + Math.random() * 0.8
    });
  }
  for (const p of mb.particles) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 95 * dt; p.life -= p.decay * dt;
  }
  mb.particles = mb.particles.filter(p => p.life > 0);
  // Embers: float upward, respawn at bottom when dead or off-screen
  for (const e of mb.embers) {
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.life -= e.decay * dt;
    if (e.life <= 0 || e.y < -20) {
      e.x = Math.random() * W; e.y = H + 15;
      e.vx = (Math.random() - 0.5) * 16;
      e.vy = -8 - Math.random() * 20;
      e.life = 0.4 + Math.random() * 0.6;
      e.decay = 0.05 + Math.random() * 0.07;
      e.r = 1.0 + Math.random() * 2.0;
    }
  }
}

function renderMenuBg() {
  const mb = menuBg;

  // ── Dark gradient background ──
  const grad = ctx.createRadialGradient(W*0.5, H*0.42, 0, W*0.5, H*0.5, Math.max(W,H)*0.9);
  grad.addColorStop(0,   '#1c1c2e');
  grad.addColorStop(0.55,'#0f0f1c');
  grad.addColorStop(1,   '#060610');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // ── Lemniscate track guide (glow band + centre line) ──
  const rx = W * 0.37, ry = H * 0.27;
  function lemPt(tt) {
    const d = 1 + Math.sin(tt)*Math.sin(tt);
    return [W/2 + rx*Math.cos(tt)/d, H/2 + ry*Math.sin(tt)*Math.cos(tt)/d];
  }
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  // Outer glow band
  ctx.strokeStyle = 'rgba(231,76,60,0.07)'; ctx.lineWidth = 32;
  ctx.beginPath();
  for (let i = 0; i <= 300; i++) {
    const [px,py] = lemPt(i/300*TAU);
    i === 0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.closePath(); ctx.stroke();
  // Mid glow
  ctx.strokeStyle = 'rgba(231,76,60,0.10)'; ctx.lineWidth = 10;
  ctx.beginPath();
  for (let i = 0; i <= 300; i++) {
    const [px,py] = lemPt(i/300*TAU);
    i === 0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.closePath(); ctx.stroke();
  // Bright centre line
  ctx.strokeStyle = 'rgba(231,76,60,0.18)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i <= 300; i++) {
    const [px,py] = lemPt(i/300*TAU);
    i === 0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.closePath(); ctx.stroke();

  // ── Tire trail — wide glow pass then sharp core ──
  const maxAge = 11.0;
  ctx.lineCap = 'round';
  // Wide glow layer (drift sections only)
  for (let i = 1; i < mb.trail.length; i++) {
    const p = mb.trail[i], pp = mb.trail[i-1];
    if (!p.drift || !pp.drift) continue;
    const a = Math.max(0, 1 - p.age/maxAge);
    if (a < 0.005) continue;
    ctx.strokeStyle = ACCENT; ctx.lineWidth = 9;
    ctx.globalAlpha = a * 0.07;
    ctx.beginPath(); ctx.moveTo(pp.x,pp.y); ctx.lineTo(p.x,p.y); ctx.stroke();
  }
  // Sharp core line
  for (let i = 1; i < mb.trail.length; i++) {
    const p = mb.trail[i], pp = mb.trail[i-1];
    const a = Math.max(0, 1 - p.age/maxAge);
    if (a < 0.005) continue;
    const isDrift = p.drift && pp.drift;
    ctx.strokeStyle = isDrift ? ACCENT : 'rgba(255,255,255,0.5)';
    ctx.lineWidth   = isDrift ? 2.4 : 0.7;
    ctx.globalAlpha = isDrift ? a*0.6 : a*0.06;
    ctx.beginPath(); ctx.moveTo(pp.x,pp.y); ctx.lineTo(p.x,p.y); ctx.stroke();
  }
  ctx.globalAlpha = 1; ctx.lineCap = 'butt';

  // ── Ambient embers ──
  for (const e of mb.embers) {
    ctx.globalAlpha = e.life * 0.5;
    ctx.fillStyle = ACCENT;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * e.life, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ── Trailing ghost cars (phase-offset behind the lead) ──
  const ghostOffsets = [3.8, 2.0];
  ghostOffsets.forEach((off, i) => {
    const tt = mb.t - off;
    const [gx, gy] = lemPt(tt);
    const [gx2,gy2] = lemPt(tt + 0.012);
    const ga = Math.atan2(gy2-gy, gx2-gx) - PI/2;
    drawCarBody(ctx, gx, gy, ga, '#ffffff', 2.2, i === 0 ? 0.08 : 0.04);
  });

  // ── Sparks — white→yellow→orange→red as life drops ──
  for (const p of mb.particles) {
    const col = p.life > 0.7 ? '#FFFFFF' :
                p.life > 0.45 ? '#FFE000' :
                p.life > 0.2  ? '#FF6A00' : ACCENT;
    ctx.globalAlpha = p.life * 0.85;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.3, 2.6*p.life), 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ── Lead car glow halo ──
  const halo = ctx.createRadialGradient(mb.x, mb.y, 0, mb.x, mb.y, 60);
  halo.addColorStop(0, 'rgba(231,76,60,0.16)');
  halo.addColorStop(1, 'rgba(231,76,60,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(mb.x, mb.y, 60, 0, TAU); ctx.fill();

  // ── Headlight beams ──
  // ── Headlight beams ──
  const carFwd = mb.angle;
  for (const side of [-1, 1]) {
    const hx = mb.x + Math.cos(carFwd)*22 + Math.cos(carFwd+PI/2)*side*8;
    const hy = mb.y + Math.sin(carFwd)*22 + Math.sin(carFwd+PI/2)*side*8;
    const bLen = 120;
    const beamGrad = ctx.createRadialGradient(hx, hy, 0, hx, hy, bLen);
    beamGrad.addColorStop(0,   'rgba(255,252,210,0.28)');
    beamGrad.addColorStop(0.4, 'rgba(255,252,210,0.10)');
    beamGrad.addColorStop(1,   'rgba(255,252,210,0)');
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.arc(hx, hy, bLen, carFwd - 0.36, carFwd + 0.36);
    ctx.closePath();
    ctx.fillStyle = beamGrad; ctx.fill();
    ctx.restore();
  }

  // ── Lead car silhouette ──
  drawCarBody(ctx, mb.x, mb.y, mb.angle - PI/2, '#ffffff', 2.6, 0.28);

  // ── Vignette (stronger on dark bg) ──
  const vig = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.15, W/2, H/2, Math.max(W,H)*0.78);
  vig.addColorStop(0,   'rgba(0,0,0,0)');
  vig.addColorStop(0.55,'rgba(0,0,0,0.18)');
  vig.addColorStop(1,   'rgba(0,0,0,0.62)');
  ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);
}

function drawTrackMinimap(track, bx, by, bw, bh) {
  const walls = track.walls;
  if (!walls || walls.length === 0) return;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const w of walls) {
    minX = Math.min(minX, w.x1, w.x2);
    maxX = Math.max(maxX, w.x1, w.x2);
    minY = Math.min(minY, w.y1, w.y2);
    maxY = Math.max(maxY, w.y1, w.y2);
  }
  const tw = maxX - minX || 1, th = maxY - minY || 1;
  const pad = 8;
  const sc = Math.min((bw - pad*2) / tw, (bh - pad*2) / th) * 0.88;
  const ox = bx + bw/2 - (minX + tw/2) * sc;
  const oy = by + bh/2 - (minY + th/2) * sc;
  ctx.save();
  ctx.beginPath(); roundRect(ctx, bx+2, by+2, bw-4, bh-4, 6); ctx.clip();
  // Build outer and inner polylines (outer = odd indices, inner = even)
  const outerPts = [], innerPts = [];
  for (let i = 0; i < walls.length; i += 2) innerPts.push({x: ox+walls[i].x1*sc, y: oy+walls[i].y1*sc});
  for (let i = 1; i < walls.length; i += 2) outerPts.push({x: ox+walls[i].x1*sc, y: oy+walls[i].y1*sc});
  // Fill track band
  ctx.beginPath();
  outerPts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.closePath(); ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.fill();
  // Outer wall
  ctx.strokeStyle = track.accent; ctx.lineWidth = 1.4; ctx.globalAlpha = 0.7;
  ctx.beginPath();
  outerPts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.closePath(); ctx.stroke();
  // Inner wall
  ctx.lineWidth = 0.9; ctx.globalAlpha = 0.4;
  ctx.beginPath();
  innerPts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.closePath(); ctx.stroke();
  ctx.globalAlpha = 1; ctx.restore();
}

        ctx.font = '200 ' + Math.min(10, W/52) + 'px Helvetica Neue, Arial';
        ctx.textAlign = 'left';
        ctx.fillText('No scores yet — be first!', lx + W * 0.05, y + rowH / 2);
        y += rowH;
      } else {
        entries.forEach((entry, i) => {
          const isMe    = entry.name === playerName;
          const isFirst = i === 0;
          if (isMe) {
            ctx.fillStyle = 'rgba(52,152,219,0.09)';
            ctx.fillRect(lx, y, rw, rowH);
          }
          ctx.fillStyle = isFirst ? track.accent : MID;
          ctx.font = 'bold ' + Math.min(10, W/52) + 'px Helvetica Neue, Arial';
          ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
          ctx.fillText('#' + (i + 1), lx, y + rowH / 2);
          ctx.fillStyle = isMe ? ACCENT2 : DARK;
          ctx.font = (isFirst ? 'bold' : '300') + ' ' + Math.min(11, W/50) + 'px Helvetica Neue, Arial';
          ctx.fillText((entry.name || 'Anon').slice(0, 16), lx + W * 0.055, y + rowH / 2);
          ctx.fillStyle = isFirst ? track.accent : DARK;
          ctx.font = 'bold ' + Math.min(11, W/50) + 'px Helvetica Neue, Arial';
          ctx.textAlign = 'right';
          ctx.fillText((entry.score || 0).toLocaleString(), lx + rw, y + rowH / 2);
          y += rowH;
        });
      }
      y += gap;
    });
  }

  ctx.fillStyle = MID; ctx.textBaseline = 'alphabetic';
  ctx.font = '200 13px Helvetica Neue, Arial';
  ctx.textAlign = 'center';
  ctx.fillText('TAP HERE OR ESC TO GO BACK', W/2, H * 0.97);
}

// ── BIOME DECORATION RENDERERS ─────────────────────────────────────────────

function renderBiomeDecorations(ctx, track) {
  for (const d of track.decorations) {
    const a = Math.min(0.92, d.alpha * 13 + 0.44);
    switch (track.biome) {

      case 'forest': default: {
        if (d.type === 'circle') {
          const r = d.size * 1.3 + 2;
          ctx.fillStyle = `rgba(32,60,22,${a})`;
          ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, TAU); ctx.fill();
          ctx.fillStyle = `rgba(58,95,38,${a * 0.76})`;
          ctx.beginPath(); ctx.arc(d.x - r*0.22, d.y - r*0.22, r*0.58, 0, TAU); ctx.fill();
        } else {
          const w2 = d.size*1.9, h2 = d.size*0.9;
          ctx.fillStyle = `rgba(60,65,75,${a})`;
          ctx.fillRect(d.x - w2/2, d.y - h2/2, w2, h2);
          ctx.fillStyle = `rgba(40,44,52,${a*0.82})`;
          ctx.fillRect(d.x - w2/2, d.y - h2/2, w2, h2*0.28);
        }
        break;
      }

      case 'desert': {
        if (d.type === 'circle') {
          // Boulder
          const r = d.size * 1.25 + 2;
          ctx.fillStyle = `rgba(148,105,58,${a})`;
          ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, TAU); ctx.fill();
          ctx.fillStyle = `rgba(188,148,90,${a * 0.55})`;
          ctx.beginPath(); ctx.arc(d.x - r*0.25, d.y - r*0.28, r*0.55, 0, TAU); ctx.fill();
        } else {
          // Cactus
          const ch = d.size*3.0, cw = d.size*0.58, aw = d.size*0.48, ah = d.size*1.0;
          ctx.fillStyle = `rgba(55,102,46,${a})`;
          ctx.fillRect(d.x - cw/2, d.y - ch, cw, ch);
          // Left arm
          ctx.fillRect(d.x - cw/2 - aw*1.1, d.y - ch*0.60, aw*1.1, aw*0.65);
          ctx.fillRect(d.x - cw/2 - aw*1.1, d.y - ch*0.60 - ah*0.38, aw*0.68, ah*0.38);
          // Right arm
          ctx.fillRect(d.x + cw/2, d.y - ch*0.44, aw*1.0, aw*0.62);
          ctx.fillRect(d.x + cw/2 + aw*0.32, d.y - ch*0.44 - ah*0.32, aw*0.68, ah*0.32);
        }
        break;
      }

      case 'snow': {
        if (d.type === 'circle') {
          // Snow-covered pine tree
          const r = d.size * 1.1 + 2;
          // Outer canopy
          ctx.fillStyle = `rgba(28,58,36,${a})`;
          ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, TAU); ctx.fill();
          // Darker centre — gives the canopy depth
          ctx.fillStyle = `rgba(12,30,18,${a * 0.55})`;
          ctx.beginPath(); ctx.arc(d.x, d.y, r * 0.45, 0, TAU); ctx.fill();
          // Snow cap — small, sitting at the very top edge only
          ctx.fillStyle = `rgba(228,240,250,${a * 0.92})`;
          ctx.beginPath(); ctx.arc(d.x, d.y - r * 0.52, r * 0.38, 0, TAU); ctx.fill();
        } else {
          // Snow-covered cabin
          const w2 = d.size*1.8, h2 = d.size*0.95;
          ctx.fillStyle = `rgba(75,65,60,${a})`;
          ctx.fillRect(d.x - w2/2, d.y - h2, w2, h2);
          // Snow on roof
          ctx.fillStyle = `rgba(218,232,244,${a * 0.9})`;
          ctx.fillRect(d.x - w2*0.58, d.y - h2 - h2*0.28, w2*1.16, h2*0.28);
          // Small window light
          ctx.fillStyle = `rgba(255,230,140,${a * 0.7})`;
          ctx.fillRect(d.x - d.size*0.22, d.y - h2*0.62, d.size*0.44, d.size*0.35);
        }
        break;
      }

      case 'water': {
        if (d.type === 'circle') {
          // Colourful fish
          const fs = d.size * 0.9 + 1.5;
          const fishPalette = ['rgba(255,175,45,', 'rgba(255,110,55,', 'rgba(70,175,220,', 'rgba(240,200,60,'];
          const ci = Math.floor(Math.abs(d.x + d.y) % 4);
          ctx.save();
          ctx.translate(d.x, d.y);
          // Body
          ctx.fillStyle = fishPalette[ci] + a + ')';
          ctx.beginPath(); ctx.ellipse(0, 0, fs, fs*0.48, 0, 0, TAU); ctx.fill();
          // Tail
          ctx.fillStyle = fishPalette[ci] + (a*0.7) + ')';
          ctx.beginPath();
          ctx.moveTo(-fs, 0);
          ctx.lineTo(-fs - fs*0.55, -fs*0.38);
          ctx.lineTo(-fs - fs*0.55,  fs*0.38);
          ctx.closePath(); ctx.fill();
          // Eye
          ctx.fillStyle = `rgba(8,8,8,${a})`;
          ctx.beginPath(); ctx.arc(fs*0.38, -fs*0.1, fs*0.11, 0, TAU); ctx.fill();
          ctx.restore();
        } else {
          // Sailboat
          const bw = d.size*2.2, bh = d.size*0.8, mH = d.size*2.9;
          // Hull
          ctx.fillStyle = `rgba(145,88,48,${a})`;
          ctx.beginPath();
          ctx.moveTo(d.x - bw/2,        d.y);
          ctx.lineTo(d.x + bw/2,        d.y);
          ctx.lineTo(d.x + bw/2 - bh*0.3, d.y - bh);
          ctx.lineTo(d.x - bw/2 + bh*0.3, d.y - bh);
          ctx.closePath(); ctx.fill();
          // Mast
          ctx.fillStyle = `rgba(95,68,38,${a})`;
          ctx.fillRect(d.x - 1.5, d.y - bh - mH, 3, mH);
          // Sail
          ctx.fillStyle = `rgba(245,240,230,${a*0.92})`;
          ctx.beginPath();
          ctx.moveTo(d.x,           d.y - bh - mH*0.96);
          ctx.lineTo(d.x + bw*0.62, d.y - bh - mH*0.28);
          ctx.lineTo(d.x,           d.y - bh - mH*0.04);
          ctx.closePath(); ctx.fill();
        }
        break;
      }

      case 'night': {
        if (d.type === 'circle') {
          // Street lamp
          const pH = d.size*2.8;
          ctx.fillStyle = `rgba(68,72,95,${a})`;
          ctx.fillRect(d.x - 1.5, d.y - pH, 3, pH);         // pole
          ctx.fillRect(d.x - 1.5, d.y - pH, d.size*0.9, 2); // arm
          // Glow bloom
          ctx.fillStyle = `rgba(255,235,145,${a*0.18})`;
          ctx.beginPath(); ctx.arc(d.x + d.size*0.45, d.y - pH + 1, d.size*1.8, 0, TAU); ctx.fill();
          // Bulb
          ctx.fillStyle = `rgba(255,248,195,${a*0.95})`;
          ctx.beginPath(); ctx.arc(d.x + d.size*0.45, d.y - pH + 1, d.size*0.35, 0, TAU); ctx.fill();
        } else {
          // City building with lit windows
          const bw = d.size*1.85 + 5, bh = d.size*3.8 + 10;
          ctx.fillStyle = `rgba(14,16,26,${a})`;
          ctx.fillRect(d.x - bw/2, d.y - bh, bw, bh);
          const wCols = 3, wRows = Math.max(2, Math.floor(bh / 11));
          for (let r = 0; r < wRows; r++) {
            for (let c = 0; c < wCols; c++) {
              const lit = Math.floor(Math.abs(d.x*7 + d.y*3 + r*11 + c*17)) % 3;
              if (lit > 0) {
                ctx.fillStyle = lit === 1
                  ? `rgba(255,232,110,${a*0.78})`
                  : `rgba(155,208,255,${a*0.45})`;
                const wx = d.x - bw/2 + (c + 0.5)*bw/wCols - bw*0.11/2;
                const wy = d.y - bh*0.95 + r*(bh*0.82/wRows);
                ctx.fillRect(wx, wy, bw*0.11, 5.5);
              }
            }
          }
        }
        break;
      }
    }
  }
}

// Animated water-surface shimmer (world-space, behind the road)
function renderWaves() {
  ctx.save();
  ctx.strokeStyle = 'rgba(130,200,255,0.13)';
  ctx.lineWidth = 1.5;
  const step = 70, t = frameCount * 0.022;
  const wx0 = camera.x - W, wx1 = camera.x + W;
  for (let wy = Math.floor((camera.y - H) / step) * step; wy < camera.y + H; wy += step) {
    ctx.beginPath();
    let first = true;
    for (let wx = wx0; wx <= wx1; wx += 10) {
      const wvy = wy + Math.sin(wx * 0.012 + t) * 6 + Math.sin(wx * 0.022 - t*0.7) * 3;
      if (first) { ctx.moveTo(wx, wvy); first = false; } else ctx.lineTo(wx, wvy);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// Animated snowfall (screen-space, in front of world)
function renderSnowfall() {
  for (let i = 0; i < 75; i++) {
    const speed = 0.55 + (i % 6) * 0.14;
    const drift = Math.sin(frameCount * 0.009 + i * 0.88) * 0.9;
    const x = ((i * 199.4 + frameCount * drift) % (W + 20) + W + 20) % (W + 20);
    const y = ((i * 117.3 + frameCount * speed) % (H + 10) + H + 10) % (H + 10);
    const alpha = 0.72 + (i % 3) * 0.09;

    if (i % 4 === 0) {
      // Shaped snowflake — 6-arm cross, slowly rotating
      const r = 4.5 + (i % 4) * 1.2;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(frameCount * 0.012 + i * 0.55);
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 1.5;
      for (let arm = 0; arm < 3; arm++) {
        ctx.beginPath(); ctx.moveTo(-r, 0); ctx.lineTo(r, 0); ctx.stroke();
        // Small side branches
        ctx.beginPath(); ctx.moveTo(-r*0.55, -r*0.28); ctx.lineTo(-r*0.55, r*0.28); ctx.stroke();
        ctx.beginPath(); ctx.moveTo( r*0.55, -r*0.28); ctx.lineTo( r*0.55, r*0.28); ctx.stroke();
        ctx.rotate(Math.PI / 3);
      }
      ctx.restore();
    } else {
      // Simple round flake — still nicely sized
      const r = 1.8 + (i % 5) * 0.55;
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();
    }
  }
}

// Twinkling stars (screen-space, rendered behind world in renderGame)
function renderStars() {
  for (let i = 0; i < 110; i++) {
    const x       = (i * 199.4 + Math.floor(i / 3) * 57) % W;
    const y       = (i * 117.3 + Math.floor(i / 5) * 43) % (H * 0.88);
    const twinkle = 0.55 + Math.sin(frameCount * 0.045 + i * 1.37) * 0.38;
    const radius  = 0.7 + (i % 5) * 0.28;
    ctx.fillStyle = `rgba(255,252,220,${twinkle})`;
    ctx.beginPath(); ctx.arc(x, y, radius, 0, TAU); ctx.fill();
    // Occasional cross-glint on brighter stars
    if (i % 7 === 0 && twinkle > 0.8) {
      const gl = radius * 3.5;
      ctx.strokeStyle = `rgba(255,252,220,${(twinkle - 0.5) * 0.5})`;
      ctx.lineWidth = 0.6;
      ctx.beginPath(); ctx.moveTo(x - gl, y); ctx.lineTo(x + gl, y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, y - gl); ctx.lineTo(x, y + gl); ctx.stroke();
    }
  }
}


function renderGame() {
  ctx.fillStyle = currentTrack ? currentTrack.bgColor : '#4a6b3a';
  ctx.fillRect(0, 0, W, H);
  if (!car || !currentTrack) return;

  // Screen-space background effects (behind world)
  if (currentTrack.biome === 'night') renderStars();

  ctx.save();
  const zoom = camera.zoom * Math.min(W, H) / 800;
  ctx.translate(W/2, H/2);
  ctx.scale(zoom, zoom);
  ctx.translate(-camera.x, -camera.y);

  // Grid
  ctx.strokeStyle = 'rgba(44,62,80,0.03)'; ctx.lineWidth = 1;
  const gs = 100;
  const sx = Math.floor((camera.x - W) / gs) * gs;
  const sy = Math.floor((camera.y - H) / gs) * gs;
  for (let x = sx; x < camera.x + W; x += gs) { ctx.beginPath(); ctx.moveTo(x, sy); ctx.lineTo(x, camera.y+H); ctx.stroke(); }
  for (let y = sy; y < camera.y + H; y += gs) { ctx.beginPath(); ctx.moveTo(sx, y); ctx.lineTo(camera.x+W, y); ctx.stroke(); }

  renderBiomeDecorations(ctx, currentTrack);
  if (currentTrack.biome === 'water') renderWaves();

  // Track surface
  const SURFACE = { forest:'rgba(205,210,215,0.97)', desert:'rgba(218,208,192,0.97)', snow:'rgba(228,234,242,0.97)', water:'rgba(200,210,220,0.97)', night:'rgba(150,155,165,0.97)' };
  ctx.fillStyle = SURFACE[currentTrack.biome] || 'rgba(205,210,215,0.97)';
  const walls = currentTrack.walls;
  for (let i = 0; i < walls.length - 1; i += 2) {
    const inner = walls[i], outer = walls[i+1];
    ctx.beginPath();
    ctx.moveTo(inner.x1, inner.y1); ctx.lineTo(inner.x2, inner.y2);
    ctx.lineTo(outer.x2, outer.y2); ctx.lineTo(outer.x1, outer.y1);
    ctx.closePath(); ctx.fill();
  }

  // Tire marks
  ctx.fillStyle = 'rgba(44,62,80,0.12)';
  for (const m of car.tireMarks) { ctx.beginPath(); ctx.arc(m.x, m.y, 2.5, 0, TAU); ctx.fill(); }

  // Impact sparks
  for (const s of sparks) {
    const alpha = s.life / s.maxLife;
    ctx.fillStyle = 'rgba(' + s.r + ',' + s.g + ',' + s.b + ',' + alpha + ')';
    const sz = Math.max(0.3, alpha * 3.5);
    ctx.beginPath(); ctx.arc(s.x, s.y, sz, 0, TAU); ctx.fill();
  }

  // Start/finish line only — checkpoints are invisible (logic only)
  {
    const sf = currentTrack.checkpoints[0];
    const sfPx = -sf.ny, sfPy = sf.nx; // perpendicular = across the track
    const segs = 10;
    const segLen = sf.w / segs;
    ctx.lineWidth = 7; ctx.lineCap = 'butt';
    for (let i = 0; i < segs; i++) {
      ctx.strokeStyle = i % 2 === 0 ? '#ffffff' : '#111111';
      const t0 = i / segs - 0.5, t1 = (i + 1) / segs - 0.5;
      ctx.beginPath();
      ctx.moveTo(sf.x + sfPx * sf.w * t0, sf.y + sfPy * sf.w * t0);
      ctx.lineTo(sf.x + sfPx * sf.w * t1, sf.y + sfPy * sf.w * t1);
      ctx.stroke();
    }
    ctx.lineCap = 'round';
  }

  // Track curbing — alternating red / white stripes along the wall edges
  ctx.lineCap = 'butt';
  walls.forEach((w, idx) => {
    ctx.strokeStyle = Math.floor(idx / 5) % 2 === 0 ? '#e8e2d8' : '#b02020';
    ctx.lineWidth = 11;
    ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke();
  });

  // Walls — drawn as 3-D concrete barriers (face + top edge)
  ctx.lineCap = 'round';
  // Face: south-facing side of barrier (offset down, darker)
  ctx.save();
  ctx.translate(0, 4);
  ctx.strokeStyle = '#1a2a36'; ctx.lineWidth = 6;
  for (const w of walls) { ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke(); }
  ctx.restore();
  // Top edge: lighter stripe on top of barrier
  ctx.strokeStyle = '#4d6475'; ctx.lineWidth = 3;
  for (const w of walls) { ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke(); }

  // Particles (tire smoke + engine damage smoke)
  for (const p of car.particles) {
    const a = p.life / p.maxLife;
    if (p.isDamage) {
      ctx.fillStyle = 'rgba(12,12,12,' + (a * 0.5) + ')';
      ctx.beginPath(); ctx.arc(p.x, p.y, 3 + (1 - a) * 5, 0, TAU); ctx.fill();
    } else {
      ctx.fillStyle = 'rgba(44,62,80,' + (a * 0.3) + ')';
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, TAU); ctx.fill();
    }
  }

  // Car
  drawCar(ctx, car);

  ctx.restore();

  // Screen-space foreground effects (in front of world)
  if (currentTrack.biome === 'snow') renderSnowfall();

  // HUD
  renderHUD();
  if (countdown > 0) renderCountdown();

  // Touch controls overlay (only during gameplay)
  if (gameState === 'playing' && countdown <= 0 && ('ontouchstart' in window)) {
    renderTouchControls();
  }
}

// Darken a hex colour by factor (0 = black, 1 = original)
function darkenHex(hex, factor) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  const r = Math.max(0, Math.floor(parseInt(hex.substr(0,2), 16) * factor));
  const g = Math.max(0, Math.floor(parseInt(hex.substr(2,2), 16) * factor));
  const b = Math.max(0, Math.floor(parseInt(hex.substr(4,2), 16) * factor));
  return `rgb(${r},${g},${b})`;
}

function drawCar(ctx, car) {
  const lift = 5;
  const cl = car.length, cw = car.width;
  const fx = car.wheelBase * 0.40;   // front axle X
  const rx = -car.wheelBase * 0.40;  // rear axle X
  const sy = cw / 2 + 2.5;           // tyre centre Y (2.5px beyond body edge)
  const tl = 10, tw = 5;             // tyre length (along car) and width (across)

  // 1. Ground shadow
  ctx.save();
  ctx.translate(car.x + 4, car.y + 7);
  ctx.rotate(car.angle);
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#000';
  ctx.scale(1.14, 1.2);
  roundRect(ctx, -cl/2, -cw/2, cl, cw, 5); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();

  // 2. Tyres — drawn at GROUND LEVEL before the body so the elevated
  //    body overlaps their inner edge, making them appear to stick out sideways
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle);

  function drawTyre(tx, ty, steer) {
    ctx.save();
    ctx.translate(tx, ty);
    if (steer) ctx.rotate(steer);
    ctx.fillStyle = '#12121e';
    ctx.fillRect(-tl/2, -tw/2, tl, tw);
    // Rim highlight strip
    ctx.fillStyle = 'rgba(100,100,130,0.45)';
    ctx.fillRect(-tl/2 + 1.5, -tw/2 + 1, tl - 3, 1.5);
    ctx.restore();
  }

  drawTyre(fx, -sy, car.steerAngle);  // front-left
  drawTyre(fx,  sy, car.steerAngle);  // front-right
  drawTyre(rx, -sy, 0);               // rear-left
  drawTyre(rx,  sy, 0);               // rear-right
  ctx.restore();

  // 3. Side face — 3D depth strip at ground level
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle);
  ctx.fillStyle = darkenHex(car.def.color, 0.42);
  roundRect(ctx, -cl/2, -cw/2, cl, cw, 4); ctx.fill();
  ctx.restore();

  // 4. Elevated car body + details
  ctx.save();
  ctx.translate(car.x, car.y - lift);
  ctx.rotate(car.angle);

  // Base body
  ctx.fillStyle = car.def.color;
  roundRect(ctx, -cl/2, -cw/2, cl, cw, 4); ctx.fill();

  // Front bonnet — slightly lighter
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  roundRect(ctx, cl*0.15, -cw/2+1, cl*0.33, cw-2, 2); ctx.fill();

  // Windshield
  ctx.fillStyle = 'rgba(185,220,255,0.58)';
  roundRect(ctx, cl*0.04, -cw/2+2, cl*0.19, cw-4, 2); ctx.fill();

  // Cabin roof (darker centre strip)
  ctx.fillStyle = darkenHex(car.def.color, 0.68);
  roundRect(ctx, -cl*0.13, -cw/2+2.5, cl*0.27, cw-5, 2); ctx.fill();

  // Roof highlight
  ctx.fillStyle = 'rgba(255,255,255,0.13)';
  roundRect(ctx, -cl*0.07, -cw/2+3.5, cl*0.2, cw-7, 1); ctx.fill();

  // Rear window
  ctx.fillStyle = 'rgba(175,210,255,0.38)';
  roundRect(ctx, -cl*0.36, -cw/2+2.5, cl*0.14, cw-5, 1); ctx.fill();

  // Headlights
  ctx.fillStyle = 'rgba(255,248,200,0.85)';
  ctx.fillRect(cl/2-3, -cw/2+1.5, 3, 3);
  ctx.fillRect(cl/2-3,  cw/2-4.5, 3, 3);

  // Drift ring on roof
  if (car.drifting) {
    ctx.strokeStyle = currentTrack.accent;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.5 + Math.sin(frameCount * 0.3) * 0.3;
    ctx.beginPath(); ctx.arc(0, 0, cl * 0.7, 0, TAU); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawCarBody(ctx, x, y, angle, color, scale, alpha) {
  ctx.save();
  ctx.translate(x, y); ctx.rotate(angle + PI/2); ctx.scale(scale, scale);
  ctx.globalAlpha = alpha;
  const cl = 32, cw = 16, lift = 3;
  const tl = 10, tw = 5, sy = cw/2 + 2.5;
  // Tyres
  ctx.fillStyle = '#12121e';
  [[cl*0.4,-sy],[cl*0.4,sy],[-cl*0.4,-sy],[-cl*0.4,sy]].forEach(([tx,ty]) => {
    ctx.fillRect(tx-tl/2, ty-tw/2, tl, tw);
  });
  // Side face (3D depth)
  ctx.fillStyle = darkenHex(color, 0.42);
  roundRect(ctx, -cl/2, -cw/2, cl, cw, 4); ctx.fill();
  // Elevated top
  ctx.save(); ctx.translate(0, -lift);
  ctx.fillStyle = color;
  roundRect(ctx, -cl/2, -cw/2, cl, cw, 4); ctx.fill();
  ctx.fillStyle = 'rgba(185,220,255,0.55)';
  roundRect(ctx, cl*0.04, -cw/2+2, cl*0.19, cw-4, 2); ctx.fill();
  ctx.fillStyle = darkenHex(color, 0.68);
  roundRect(ctx, -cl*0.13, -cw/2+2.5, cl*0.27, cw-5, 2); ctx.fill();
  ctx.fillStyle = 'rgba(175,210,255,0.38)';
  roundRect(ctx, -cl*0.36, -cw/2+2.5, cl*0.14, cw-5, 1); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
  ctx.restore();
}

function renderHUD() {
  const speedKmh = Math.round(Math.abs(car.speed) * 1.2);
  ctx.textBaseline = 'alphabetic';

  ctx.fillStyle = DARK;
  ctx.font = `bold ${Math.min(48, W/10)}px Helvetica Neue, Arial`;
  ctx.textAlign = 'left';
  ctx.fillText(speedKmh, 20, H - 30);
  ctx.font = `200 ${Math.min(14, W/28)}px Helvetica Neue, Arial`;
  ctx.fillText('KM/H', 20, H - 55);

  ctx.textAlign = 'right';
  ctx.fillStyle = MID;
  ctx.font = `200 ${Math.min(14, W/28)}px Helvetica Neue, Arial`;
  ctx.fillText('LAP', W-20, 30);
  ctx.fillStyle = DARK;
  ctx.font = `bold ${Math.min(32, W/14)}px Helvetica Neue, Arial`;
  ctx.fillText(`${Math.min(lapCount+1, currentTrack.laps)}/${currentTrack.laps}`, W-20, 60);
  ctx.fillStyle = MID;
  ctx.font = `200 ${Math.min(14, W/28)}px Helvetica Neue, Arial`;
  ctx.fillText('TIME', W-20, 85);
  ctx.fillStyle = DARK;
  ctx.font = `300 ${Math.min(20, W/20)}px Helvetica Neue, Arial`;
  ctx.fillText(formatTime(raceTime), W-20, 105);

  ctx.textAlign = 'left';
  ctx.fillStyle = currentTrack.accent;
  ctx.font = `bold ${Math.min(24, W/16)}px Helvetica Neue, Arial`;
  ctx.fillText(totalDriftScore.toLocaleString(), 20, 40);
  ctx.fillStyle = MID;
  ctx.font = `200 ${Math.min(12, W/30)}px Helvetica Neue, Arial`;
  ctx.fillText('DRIFT SCORE', 20, 55);

  if (driftCombo > 0 && driftComboTimer > 0) {
    const comboColors = ['#ffffff', '#FFE000', '#FF8C00', '#FF3300', '#FF0066'];
    const comboCol = comboColors[Math.min(driftMultiplier - 1, 4)];
    const sizeBoost = Math.min(1.45, 1 + driftCombo / 2500);
    const fade = Math.min(1, driftComboTimer / 0.35);
    ctx.globalAlpha = fade;
    ctx.fillStyle = comboCol;
    ctx.font = `bold ${Math.min(38 * sizeBoost, W/9)}px Helvetica Neue, Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(`+${Math.floor(driftCombo * driftMultiplier).toLocaleString()}`, W/2, H * 0.3);
    if (driftMultiplier > 1) {
      ctx.font = `bold ${Math.min(21, W/19) * sizeBoost}px Helvetica Neue, Arial`;
      ctx.fillText(`× ${driftMultiplier}`, W/2, H * 0.3 + 36);
    }
    ctx.globalAlpha = 1;
  }

  // Pause button (bigger hit area)
  ctx.fillStyle = 'rgba(149,165,166,0.3)';
  roundRect(ctx, W/2-25, 5, 50, 30, 4); ctx.fill();
  ctx.fillStyle = MID;
  ctx.font = '18px Helvetica Neue, Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('| |', W/2, 20);
  ctx.textBaseline = 'alphabetic';
}

function renderCountdown() {
  const n = Math.ceil(countdown);
  ctx.fillStyle = `rgba(248,249,250,${Math.min(1, countdown*0.5)})`;
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (n > 0 && n <= 3) {
    const scale = 1 + (countdown - Math.floor(countdown)) * 0.3;
    ctx.save(); ctx.translate(W/2, H/2); ctx.scale(scale, scale);
    ctx.fillStyle = DARK;
    ctx.font = `bold ${Math.min(120, W/4)}px Helvetica Neue, Arial`;
    ctx.fillText(n, 0, 0);
    ctx.restore();
  } else if (countdown <= 0.5 && countdown > 0) {
    ctx.fillStyle = currentTrack.accent;
    ctx.font = `bold ${Math.min(120, W/4)}px Helvetica Neue, Arial`;
    ctx.fillText('GO!', W/2, H/2);
  }
  ctx.textBaseline = 'alphabetic';
}

function renderTouchControls() {
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = MID; ctx.lineWidth = 2;
  ctx.setLineDash([8, 8]);
  ctx.beginPath(); ctx.moveTo(W/2, H*0.6); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  if (touchLeft) {
    ctx.fillStyle = currentTrack.accent;
    ctx.beginPath(); ctx.arc(touchLeft.sx, touchLeft.sy, 40, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(touchLeft.cx, touchLeft.cy, 25, 0, TAU); ctx.fill();
  }
  if (touchRight) {
    ctx.fillStyle = currentTrack.accent;
    ctx.beginPath(); ctx.arc(touchRight.sx, touchRight.sy, 40, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = DARK; ctx.font = '13px Helvetica Neue, Arial';
  ctx.textAlign = 'center';
  ctx.fillText('← STEER →', W*0.25, H*0.85);
  ctx.fillText('↑ GAS / ↓ BRAKE', W*0.75, H*0.85);
  ctx.globalAlpha = 1;
}

function renderPause() {
  ctx.fillStyle = 'rgba(248,249,250,0.9)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = DARK;
  ctx.font = `bold ${Math.min(48, W/8)}px Helvetica Neue, Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('PAUSED', W/2, H * 0.3);

  const btnW = Math.min(200, W*0.5), btnH = 45;
  const items = ['RESUME', 'RESTART', 'QUIT'];
  items.forEach((label, i) => {
    const y = H * 0.45 + i * 60;
    const hover = menuHover === i;
    ctx.fillStyle = hover ? ACCENT : WHITE;
    ctx.strokeStyle = hover ? ACCENT : '#ddd';
    ctx.lineWidth = hover ? 2 : 1;
    roundRect(ctx, W/2-btnW/2, y, btnW, btnH, 6); ctx.fill();
    roundRect(ctx, W/2-btnW/2, y, btnW, btnH, 6); ctx.stroke();
    ctx.fillStyle = hover ? WHITE : DARK;
    ctx.font = `${hover ? 'bold' : '300'} ${Math.min(18, W/18)}px Helvetica Neue, Arial`;
    ctx.fillText(label, W/2, y + btnH/2);
  });
  ctx.textBaseline = 'alphabetic';
}

function renderResults() {
  ctx.fillStyle = 'rgba(248,249,250,0.92)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  ctx.fillStyle = currentTrack.accent;
  ctx.font = `bold ${Math.min(36, W/10)}px Helvetica Neue, Arial`;
  ctx.fillText('RACE COMPLETE', W/2, H * 0.1);

  const stats = [
    ['TOTAL TIME', formatTime(raceTime)],
    ['BEST LAP', bestLapTime < Infinity ? formatTime(bestLapTime) : '--'],
    ['DRIFT SCORE', totalDriftScore.toLocaleString()],
    ['TOTAL PTS', saveData.totalDriftScore.toLocaleString()]
  ];
  stats.forEach((s, i) => {
    const y = H * 0.2 + i * 45;
    ctx.fillStyle = MID;
    ctx.font = `200 ${Math.min(11, W/30)}px Helvetica Neue, Arial`;
    ctx.fillText(s[0], W/2, y);
    ctx.fillStyle = DARK;
    ctx.font = `bold ${Math.min(22, W/16)}px Helvetica Neue, Arial`;
    ctx.fillText(s[1], W/2, y + 18);
  });

  if (lapTimes.length > 0) {
    ctx.fillStyle = MID;
    ctx.font = `200 11px Helvetica Neue, Arial`;
    ctx.fillText('LAP TIMES', W/2, H * 0.56);
    lapTimes.forEach((lt, i) => {
      ctx.fillStyle = lt === bestLapTime ? currentTrack.accent : DARK;
      ctx.font = '13px Helvetica Neue, Arial';
      ctx.fillText(`LAP ${i+1}: ${formatTime(lt)}`, W/2, H * 0.6 + i * 20);
    });
  }

  const btnW = Math.min(200, W*0.5), btnH = 42;
  const items = ['RETRY', 'NEXT TRACK', 'MENU'];
  items.forEach((label, i) => {
    const y = H * 0.76 + i * 52;
    const hover = menuHover === i;
    ctx.fillStyle = hover ? currentTrack.accent : WHITE;
    ctx.strokeStyle = hover ? currentTrack.accent : '#ddd';
    ctx.lineWidth = hover ? 2 : 1;
    roundRect(ctx, W/2-btnW/2, y, btnW, btnH, 6); ctx.fill();
    roundRect(ctx, W/2-btnW/2, y, btnW, btnH, 6); ctx.stroke();
    ctx.fillStyle = hover ? WHITE : DARK;
    ctx.font = `${hover ? 'bold' : '300'} ${Math.min(16, W/20)}px Helvetica Neue, Arial`;
    ctx.fillText(label, W/2, y + btnH/2);
  });

  // Series II unlock banner
  if (seriesUnlockPending) {
    const bx = W * 0.04, bw = W * 0.92;
    const by = H * 0.04, bh = Math.min(80, H * 0.11);
    ctx.fillStyle = 'rgba(155,89,182,0.95)';
    roundRect(ctx, bx, by, bw, bh, 8); ctx.fill();
    ctx.fillStyle = WHITE;
    ctx.font = `bold ${Math.min(17, W/20)}px Helvetica Neue, Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('SERIES II UNLOCKED', W/2, by + bh * 0.34);
    ctx.font = `200 ${Math.min(10, W/36)}px Helvetica Neue, Arial`;
    ctx.fillText('ARASHI  ·  KASOKU  ·  TATSUMAKI  ·  YŪGURE  ·  KYOKUCHI', W/2, by + bh * 0.68);
  }
  ctx.textBaseline = 'alphabetic';
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function formatTime(t) {
  const m = Math.floor(t/60), s = Math.floor(t%60), ms = Math.floor((t%1)*100);
  return `${m}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
}

// --- CLICK / TAP HANDLING ---
// Use a unified handler that works for both mouse clicks and touch taps
canvas.addEventListener('click', e => {
  handleClickAt(e.clientX, e.clientY);
});

function handleClickAt(mx, my) {
  initAudio();

  if (gameState === 'menu') {
    const buttons = getMenuButtons();
    for (let i = 0; i < buttons.length; i++) {
      const b = buttons[i];
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        playMenuSelect();
        if (i === 0) { ensurePlayerName(); gameState = 'trackSelect'; selectHover = saveData.selectedTrack; }
        else if (i === 1) { refreshLeaderboard(); gameState = 'leaderboard'; }
        else if (i === 2) { gameState = 'carSelect'; selectHover = saveData.selectedCar; }
        else if (i === 3) { showHowToPlay(); }
        return;
      }
    }
    return;
  }

  if (gameState === 'leaderboard') {
    if (my > H * 0.9) { playMenuSelect(); gameState = 'menu'; return; }
    // Series tabs
    const tabW = Math.min(120, W * 0.26), tabH = 28, tabY = H * 0.08;
    const tab1X = W/2 - tabW - 6, tab2X = W/2 + 6;
    if (my >= tabY && my <= tabY + tabH) {
      if (mx >= tab1X && mx <= tab1X + tabW) { leaderboardSeriesTab = 1; playMenuSelect(); return; }
      if (mx >= tab2X && mx <= tab2X + tabW && saveData.series2Unlocked) { leaderboardSeriesTab = 2; playMenuSelect(); return; }
    }
    return;
  }

  if (gameState === 'trackSelect') {
    // Back zone (bottom of screen)
    if (my > H * 0.9) { playMenuSelect(); gameState = 'menu'; return; }
    const buttons = getTrackButtons();
    for (const b of buttons) {
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        if (b.unlocked) {
          playMenuSelect();
          saveData.selectedTrack = b.idx;
          selectHover = b.idx;
          saveSave();
          gameState = 'carSelect';
          selectHover = saveData.selectedCar;
        }
        return;
      }
    }
    return;
  }

  if (gameState === 'carSelect') {
    if (my > H * 0.9) { playMenuSelect(); gameState = 'trackSelect'; return; }
    const buttons = getCarButtons();
    for (const b of buttons) {
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        if (b.unlocked) {
          playMenuSelect();
          saveData.selectedCar = b.idx;
          saveSave();
          startRace(saveData.selectedTrack, b.idx);
        }
        return;
      }
    }
    return;
  }

  if (gameState === 'playing') {
    if (mx > W/2 - 30 && mx < W/2 + 30 && my < 40) {
      gameState = 'paused'; menuHover = 0; return;
    }
    return;
  }

  if (gameState === 'paused') {
    const btnW = Math.min(200, W*0.5), btnH = 45;
    for (let i = 0; i < 3; i++) {
      const y = H * 0.45 + i * 60;
      if (mx >= W/2-btnW/2 && mx <= W/2+btnW/2 && my >= y && my <= y+btnH) {
        playMenuSelect();
        if (i === 0) gameState = 'playing';
        else if (i === 1) startRace(saveData.selectedTrack, saveData.selectedCar);
        else gameState = 'menu';
        return;
      }
    }
    return;
  }

  if (gameState === 'results') {
    const btnW = Math.min(200, W*0.5), btnH = 42;
    for (let i = 0; i < 3; i++) {
      const y = H * 0.76 + i * 52;
      if (mx >= W/2-btnW/2 && mx <= W/2+btnW/2 && my >= y && my <= y+btnH) {
        playMenuSelect();
        seriesUnlockPending = false;
        if (i === 0) startRace(saveData.selectedTrack, saveData.selectedCar);
        else if (i === 1) {
          const next = (saveData.selectedTrack + 1) % tracks.length;
          if (saveData.unlockedTracks[next]) { saveData.selectedTrack = next; startRace(next, saveData.selectedCar); }
          else gameState = 'trackSelect';
        }
        else gameState = 'menu';
        return;
      }
    }
    return;
  }
}

// Mouse hover for desktop
canvas.addEventListener('mousemove', e => {
  const mx = e.clientX, my = e.clientY;
  if (gameState === 'menu') {
    menuHover = -1;
    const buttons = getMenuButtons();
    buttons.forEach((b, i) => {
      if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) menuHover = i;
    });
  }
  if (gameState === 'trackSelect') {
    const buttons = getTrackButtons();
    buttons.forEach(b => {
      if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) selectHover = b.idx;
    });
  }
  if (gameState === 'carSelect') {
    const buttons = getCarButtons();
    buttons.forEach(b => {
      if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) selectHover = b.idx;
    });
  }
  if (gameState === 'paused') {
    menuHover = -1;
    const btnW = Math.min(200, W*0.5), btnH = 45;
    for (let i = 0; i < 3; i++) {
      const y = H*0.45 + i*60;
      if (mx >= W/2-btnW/2 && mx <= W/2+btnW/2 && my >= y && my <= y+btnH) menuHover = i;
    }
  }
  if (gameState === 'results') {
    menuHover = -1;
    const btnW = Math.min(200, W*0.5), btnH = 42;
    for (let i = 0; i < 3; i++) {
      const y = H*0.76 + i*52;
      if (mx >= W/2-btnW/2 && mx <= W/2+btnW/2 && my >= y && my <= y+btnH) menuHover = i;
    }
  }
});

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.code === 'Escape') {
    if (gameState === 'playing') { gameState = 'paused'; menuHover = 0; }
    else if (gameState === 'paused') gameState = 'playing';
    else if (gameState === 'trackSelect') gameState = 'menu';
    else if (gameState === 'carSelect') gameState = 'trackSelect';
    else if (gameState === 'leaderboard') gameState = 'menu';
    else if (gameState === 'results') { seriesUnlockPending = false; gameState = 'menu'; }
  }
  if (e.code === 'Enter') {
    if (gameState === 'menu' && menuHover >= 0) {
      playMenuSelect();
      if (menuHover === 0) { ensurePlayerName(); gameState = 'trackSelect'; selectHover = saveData.selectedTrack; }
      else if (menuHover === 1) { refreshLeaderboard(); gameState = 'leaderboard'; }
      else if (menuHover === 2) { gameState = 'carSelect'; selectHover = saveData.selectedCar; }
      else if (menuHover === 3) showHowToPlay();
    }
    else if (gameState === 'trackSelect' && saveData.unlockedTracks[selectHover]) {
      playMenuSelect(); saveData.selectedTrack = selectHover; saveSave();
      gameState = 'carSelect'; selectHover = saveData.selectedCar;
    }
    else if (gameState === 'carSelect' && saveData.unlockedCars[selectHover]) {
      playMenuSelect(); saveData.selectedCar = selectHover; saveSave();
      startRace(saveData.selectedTrack, selectHover);
    }
    else if (gameState === 'paused') {
      playMenuSelect();
      if (menuHover === 0) gameState = 'playing';
      else if (menuHover === 1) startRace(saveData.selectedTrack, saveData.selectedCar);
      else if (menuHover === 2) gameState = 'menu';
    }
    else if (gameState === 'results') {
      playMenuSelect();
      seriesUnlockPending = false;
      if (menuHover === 0) startRace(saveData.selectedTrack, saveData.selectedCar);
      else if (menuHover === 1) {
        const next = (saveData.selectedTrack + 1) % tracks.length;
        if (saveData.unlockedTracks[next]) { saveData.selectedTrack = next; startRace(next, saveData.selectedCar); }
        else gameState = 'trackSelect';
      }
      else if (menuHover === 2) gameState = 'menu';
    }
  }
  if (gameState === 'menu' || gameState === 'paused' || gameState === 'results') {
    if (e.code === 'ArrowUp') { menuHover = Math.max(0, menuHover-1); playMenuSelect(); }
    if (e.code === 'ArrowDown') { menuHover = Math.min(3, menuHover+1); playMenuSelect(); }
  }
  if (gameState === 'trackSelect') {
    if (e.code === 'ArrowRight') { selectHover = Math.min(tracks.length-1, selectHover+1); }
    if (e.code === 'ArrowLeft') { selectHover = Math.max(0, selectHover-1); }
  }
  if (gameState === 'carSelect') {
    if (e.code === 'ArrowRight') { selectHover = Math.min(cars.length-1, selectHover+1); }
    if (e.code === 'ArrowLeft') { selectHover = Math.max(0, selectHover-1); }
  }
});

function showHowToPlay() {
  alert('DRIFT // PURE\n\nCONTROLS:\n← → or A/D: Steer\n↑ or W: Gas\n↓ or S/Space: Brake/Reverse\n\nTOUCH:\nLeft side: Drag to steer\nRight side: Swipe up = gas, down = brake\n\nDRIFT to earn points!\nChain drifts for multipliers up to x5\n\nCAREER:\nComplete all 5 Series I tracks to unlock\nSeries II — 5 longer, harder circuits');
}

// --- RESIZE ---
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
}
window.addEventListener('resize', resize);
resize();

// --- GAME LOOP ---
function gameLoop(time) {
  dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  frameCount++;

  if (gameState === 'playing') {
    updateRace(dt);
  }
  if (gameState === 'menu') {
    updateMenuBg(dt);
  }

  render();
  requestAnimationFrame(gameLoop);
}

// --- INIT ---
loadSave();
createTracks();
initFirebase();
menuHover = 0;
requestAnimationFrame(gameLoop);
